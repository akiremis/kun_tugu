version: '3.8'

services:
  mongodb:
    image: mongo:4.4
    container_name: astro-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - astro_data:/data/db

  backend:
    build: ./backend
    container_name: astro-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - MONGO_URI=mongodb://mongodb:27017/astro-mongo
      - PORT=8080
    volumes:
      # SİHİRLİ DOKUNUŞ 1: Senin backend klasörünü, konteynerin /app klasörüne canlı bağlar
      - ./backend:/app
      # Korumalı Alan: Senin yerel node_modules klasörünün Docker içindekileri ezmesini engeller
      - /app/node_modules
    # Node.js v24'ün yerleşik izleme modunu tetikler. Kod değiştiğinde sunucuyu anında yeniden başlatır.
    command: node --watch server.js
    depends_on:
      - mongodb

  frontend:
    build: ./frontend
    container_name: astro-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    volumes:
      # SİHİRLİ DOKUNUŞ 2: Senin frontend klasörünü Nginx'in yayın klasörüne canlı bağlar
      - ./frontend:/usr/share/nginx/html
    depends_on:
      - backend

volumes:
  astro_data: